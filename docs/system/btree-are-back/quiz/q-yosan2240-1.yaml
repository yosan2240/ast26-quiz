author: yosan2240
date: 2026-05-30
question: |
  BAB 論文（B-Tree Modifications for High-Performance In-Memory Storage）的 comparison-based leaf 會從 heads 陣列等距取樣出一組 hints；lookup 時先掃 hints 把範圍壓到一小段，再對該段的 heads 做 binary search。論文預設取樣 16 個 hints。

  某工程師認為：「把取樣數從 16 提高到 64，binary search 範圍可從 1/16 縮到 1/64，應該更快。」但 benchmark 後 point lookup 延遲反而變差。下列哪一項最能解釋？
options:
  - text: "取樣數變多會拖慢 key-adaption 的判斷，使 leaf 在 comparison-based 與 fingerprinting 之間切換的時機延後，整體變慢。"
    explanation: |
      hints 是 comparison-based leaf 內部的查找結構，key-adaption 則是在 split / merge 時依 key 分布決定 leaf layout，兩者運作的階段與目的都不同。hints 取樣數不影響 key-adaption 的決策時機，兩者正交。
  - text: "16 個 4-byte hints 剛好 64 bytes、等於一條 cache line，掃 hints 通常只要一次 cache miss；增到 64 個會橫跨 4 條 cache line，多出的 cache miss 成本超過 binary search 範圍從 1/16 縮到 1/64 所省下的比較。"
    correct: true
    explanation: |
      這是論文選 16 的原因。x86 cache line 為 64 bytes，4 byte × 16 = 64 bytes，整個 hints 陣列對齊一條 cache line，一次 cache fill 就能載入並掃描。增為 64 個後陣列變 256 bytes，掃描要跨 4 條 cache line、多付 3 次 cache miss；而後續 binary search 本來就只剩幾次比較，省下的遠不足以抵銷。這是 cache-conscious 結構「大小對齊 cache line」的典型取捨。
  - text: "64 個 hints 佔掉太多 page 空間，使每個 page 能放的 record 變少、fan-out 下降、樹高增加，每次 lookup 都要多走一層。"
    explanation: |
      hints 從 64 bytes 增到 256 bytes 確實多吃空間，但相對於 4 KB 或 16 KB 的 page 只佔約 2–5%，不足以讓樹高多一層。benchmark 的延遲變化發生在單一 leaf 內部，與樹高無關，屬次要因素。
  - text: "hints 陣列變大後 SIMD 一次處理不完 64 個 entry，比較被迫退化成 scalar linear search，因此變慢。"
    explanation: |
      SIMD 暫存器寬度（AVX2 256-bit、AVX-512 512-bit）由硬體決定，與陣列長度無關。處理 64 個 hints 只是讓 SIMD 多跑幾輪，不會退化成 scalar。真正的瓶頸在 cache miss，不在 SIMD 計算。
