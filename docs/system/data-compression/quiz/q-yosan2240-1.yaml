author: yosan2240
date: 2026-05-30
question: |
  工程師在 backup 系統中對幾種 100 MB 檔案跑 zstd（`-3` 為預設等級，`-22` 為最高等級），結果如下：

  | 輸入檔案 | `zstd -3` | `zstd -22` |
  |---|---|---|
  | 純文字 log | 28.1 MB | 24.7 MB |
  | JPG 照片 | 100.4 MB | 100.4 MB |
  | 已 gzip 過的 log | 100.3 MB | 100.3 MB |

  他再加上 `--long=27` 把 window 開大，後兩組仍壓不下來。下列哪一項最能解釋後兩組無法再被壓縮的原因？
options:
  - text: "JPG 與已 gzip 的檔案內部都做過 entropy coding，輸出的 bitstream 在統計上已接近 maximum entropy、幾乎沒有 LZ 可利用的重複序列；entropy 是無損壓縮的下界，提高 level 或加大 window 都無法生出原本不存在的 redundancy。"
    correct: true
    explanation: |
      JPG 內部做過 DCT、quantization 與 Huffman / arithmetic coding，gzip 則是 LZ77 + Huffman，兩者的輸出都已逼近 source entropy（接近 random byte 分布）。Shannon source coding theorem 指出任何無損壓縮的平均碼長不可能低於 input 的 entropy，所以 zstd 不論 level 3 或 22 都壓不動。瓶頸在資料本身的 entropy，與演算法強度無關。
  - text: "zstd `-3` 的 window 太小，找不到檔案內部的長距離 redundancy；要改用 `--long=31` 或換成 dictionary 更大的 xz / LZMA 才壓得下來。"
    explanation: |
      把原因歸到 window 大小並不對。`-3` 的 window 已有 1 MiB、`-22` 為 128 MiB，對純文字 log 都能輕鬆壓縮。後兩組與 window 無關，開到再大也沒用，因為資料已接近 random、沒有 redundancy 可找；換 xz / LZMA 同樣無效。
  - text: "zstd 預設的 Huffman / FSE table 是為一般文字分布最佳化的靜態表，對 binary 檔案要先用 `zstd --train` 做 dictionary training 才壓得下來。"
    explanation: |
      zstd 的 Huffman 與 FSE table 是 per-block 動態建立的，每個 block 依自身 symbol 統計重新建表。`--train` 的 dictionary 是給「大量相似小檔案共享 pattern」的場景，對單一已 entropy-coded 的檔案沒有幫助。
  - text: "JPG 是 lossy 壓縮，內部的 quantization table 等 metadata 與 payload 混雜在一起，zstd 無法分辨兩者所以壓不動。"
    explanation: |
      zstd 是 byte 層級的通用壓縮器，只在 byte sequence 找重複 pattern，不需也不會分辨 metadata 與 payload。關鍵也不在 lossy：純 lossless 的「已 gzip log」一樣壓不下來。真正原因是這些檔案都已做過 entropy coding，沒有 pattern 可挖。
