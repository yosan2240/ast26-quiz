author: yosan2240
date: 2026-05-27
question: |
  將一張 100 MB 的 JPG 跑 zstd 壓縮後，輸出檔案約 100.3 MB，比原檔略大。已知 zstd 為 lossless compressor，且壓縮流程正常完成。下列哪一項最能解釋這個結果？
options:
  - text: "JPG 已經過 entropy coding，bitstream 接近 random byte distribution，LZ-family 找不到可利用的重複序列；zstd 改以 raw block 直接搬資料，但 frame header 與 block header 仍會寫入，形成淨 overhead。"
    correct: true
    explanation: |
      JPG 的編碼包含 DCT、quantization 與 Huffman/arithmetic coding，輸出 bitstream 已逼近 source entropy。Shannon source coding theorem 保證無損壓縮的平均 code length 不可能低於 input entropy，因此 zstd 無 redundancy 可挖。它偵測到 block 無法壓縮時會 fallback 到 raw block，但 frame magic、frame header、每個 block 的 header 與 checksum 仍會寫入，這部分對 incompressible 資料是淨增長。
  - text: "zstd 預設等級 `-3` 太低，提高到 `-22` 並加上 `--long=27`（將 sliding window 擴大到 128 MiB 以搜尋更遠的 redundancy）後即可成功壓縮。"
    explanation: |
      等級控制 match finding 的徹底程度，window 決定可搜尋距離。當 input 本身沒有可被利用的 redundancy 時，提高等級或加大 window 都無法找出不存在的 pattern。
  - text: "JPG 為 lossy 格式，zstd 因為無法分辨 lossy 結構與 random bytes 才壓不下來。"
    explanation: |
      zstd 在 byte 層級壓縮，不分辨 input 語意。同樣現象在 lossless 的「已 gzip 過的檔案」上也會發生，可見癥結在 entropy 而非 lossy。
  - text: "需要先以 `zstd --train` 對 JPG 做 dictionary training 才能達到壓縮效果。"
    explanation: |
      zstd 的 Huffman 與 FSE table 為 per-block dynamic，無需預先 training。`--train` 用於多個小檔案之間共享 pattern 的情境，對單一已 entropy-coded 檔案無幫助。
